name: Deploy to Azure Web App

on:
  # Deploy when PR is merged to main
  push:
    branches:
      - main

  # Allow manual deployment trigger
  workflow_dispatch:

env:
  WEBAPP_NAME: af-epr-hir-hcoms
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  IMAGE_NAME: hcoms

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: |
        VERSION=$(jq -r '.version' package.json)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image
      run: |
        docker build -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
                     -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
                     .
        docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
        docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      run: |
        az webapp config container set \
          --name ${{ env.WEBAPP_NAME }} \
          --resource-group IDSR-P-EUW-RG-01 \
          --container-image-name ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
          --container-registry-url https://index.docker.io/v1 \
          --container-registry-user ${{ vars.DOCKERHUB_USERNAME }} \
          --container-registry-password ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Restart Web App
      run: |
        az webapp restart \
          --name ${{ env.WEBAPP_NAME }} \
          --resource-group IDSR-P-EUW-RG-01

    - name: Deployment summary
      run: |
        echo "============================================"
        echo "Deployment Complete!"
        echo "Version: ${{ steps.version.outputs.version }}"
        echo "Image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
        echo "App URL: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"
        echo "============================================"
